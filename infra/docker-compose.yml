name: taxononie-dev

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # Databases: payload (portal CMS), case_api, n8n
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - taxononie-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  # Used as: job queue (import CSV), event bus (pub/sub), session cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - taxononie-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── n8n ─────────────────────────────────────────────────────────────────────
  # Workflow execution engine — called by wbb-service via REST API.
  # Workflows are versioned in ./n8n/workflows/ and auto-imported on startup.
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      # Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin123}
      # API key for wbb-service
      N8N_API_KEY: ${N8N_API_KEY:-dev-n8n-api-key-change-in-prod}
      # Database — uses dedicated postgres DB
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_POSTGRESDB_SCHEMA: public
      # Network — WEBHOOK_URL must be reachable by external callbacks in dev
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      # Locale
      GENERIC_TIMEZONE: Indian/Antananarivo
      # Workflow import on startup
      N8N_IMPORT_FROM_FOLDER: /workflows
      # Disable telemetry in dev
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taxononie-net

  # ── MinIO ───────────────────────────────────────────────────────────────────
  # S3-compatible object storage for document uploads (case-api storageRef,
  # portal media collection). Console at http://localhost:9001
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - taxononie-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  # One-shot container that creates the default buckets after MinIO is healthy.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - taxononie-net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123};
        mc mb --ignore-existing local/documents;
        mc mb --ignore-existing local/media;
        mc anonymous set download local/media;
        echo 'MinIO buckets ready';
      "

  # ── Mailhog ─────────────────────────────────────────────────────────────────
  # Local SMTP for email notifications (case status changes, approvals).
  # SMTP: localhost:1025  Web UI: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - taxononie-net

  # ── Redis Commander (optional dev UI) ───────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taxononie-net
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  minio_data:

networks:
  taxononie-net:
    driver: bridge
